modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"
issueTrackerURL="https://github.com/mwenkdev/mekavector/issues"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="${mod_authors}"
description='''
${mod_description}
'''

# Mixin config. Declared here (works in both dev and prod) as well as via the
# MixinConfigs manifest attribute in build.gradle.
[[mixins]]
    config="${mod_id}.mixins.json"

[[dependencies.${mod_id}]]
    modId="forge"
    mandatory=true
    versionRange="${forge_version_range}"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="minecraft"
    mandatory=true
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"

# Mekanism MUST load first so our mixins can weave into its compiled classes.
# Range pins the 1.20.1 branch; 10.5.x does not exist for 1.20.1.
[[dependencies.${mod_id}]]
    modId="mekanism"
    mandatory=true
    versionRange="${mekanism_version_range}"
    ordering="AFTER"
    side="BOTH"
